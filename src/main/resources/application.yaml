spring:
  application:
    name: oltp

#spring.docker.compose.enabled: false
management:
  metrics:
    export:
      otlp:
        step: 120s
      prometheus:
        enabled: false
    observations:
      key-values:
              application: ${spring.application.name}
  endpoints:
    web:
          exposure:
            include: "*"
  endpoint:
    prometheus:
          enabled: true
  observations:
    key-values:
          application: ${spring.application.name}
  tracing:
    sampling:
          probability: 1.0  # 100% sampling for development
  otlp:
    metrics:
        export:
          url: http://localhost:4318/v1/metrics


# OpenTelemetry Configuration
otel:
  service:
    name: ${spring.application.name}
  exporter:
    otlp:
      endpoint: http://localhost:4318
  traces:
    exporter: otlp
  metrics:
    exporter: otlp
  logs:
    exporter: otlp
  resource:
    attributes:
      service.name: ${spring.application.name}
      deployment.environment: development
